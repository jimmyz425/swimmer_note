<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Freestyle - front crawl position with alternating arm motion -->
  <!-- Head -->
  <circle cx="20" cy="24" r="8" fill="currentColor"/>
  <!-- Body -->
  <ellipse cx="38" cy="28" rx="18" ry="6" fill="currentColor"/>
  <!-- Extended arm reaching forward -->
  <path d="M12 32 L4 28 L6 26 L14 30" fill="currentColor"/>
  <!-- Arm sweeping back -->
  <path d="M46 30 L56 34 L54 36 L44 32" fill="currentColor"/>
  <!-- Legs kicking -->
  <path d="M52 32 L58 38 L60 36 L54 30" fill="currentColor"/>
  <path d="M50 34 L54 42 L52 44 L48 36" fill="currentColor"/>
  <!-- Water waves -->
  <path d="M0 48 Q16 44 32 48 Q48 52 64 48" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M0 52 Q16 56 32 52 Q48 48 64 52" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
</svg>