<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Backstroke - swimmer on back with arm reaching backward -->
  <!-- Head (looking up) -->
  <circle cx="52" cy="24" r="8" fill="currentColor"/>
  <!-- Body -->
  <ellipse cx="34" cy="28" rx="18" ry="6" fill="currentColor"/>
  <!-- Arm reaching back over head -->
  <path d="M54 32 L60 20 L62 22 L56 34" fill="currentColor"/>
  <!-- Other arm at side -->
  <path d="M20 30 L8 36 L10 38 L22 32" fill="currentColor"/>
  <!-- Legs -->
  <path d="M12 30 L6 38 L8 40 L14 32" fill="currentColor"/>
  <path d="M14 32 L10 40 L12 42 L16 34" fill="currentColor"/>
  <!-- Water surface line -->
  <path d="M0 20 Q16 16 32 20 Q48 24 64 20" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
</svg>